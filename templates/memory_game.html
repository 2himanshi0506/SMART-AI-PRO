<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Smart AI Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --bg-primary: #0f0c29;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --accent-green: #4ade80;
            --accent-yellow: #fbbf24;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .game-container {
            max-width: 600px;
            width: 100%;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .game-header h1 {
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .game-header p {
            color: rgba(255,255,255,0.7);
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .stat-item {
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-value {
            color: var(--accent-yellow);
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .card-front {
            background: var(--primary-gradient);
            color: white;
        }
        
        .card-back {
            background: var(--bg-card);
            border: 2px solid var(--accent-purple);
            transform: rotateY(180deg);
        }
        
        .card-back.matched {
            border-color: var(--accent-green);
            background: rgba(74, 222, 128, 0.1);
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .win-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .win-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--accent-green);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        
        .win-overlay.show .win-card {
            transform: scale(1);
        }
        
        .win-card h2 {
            color: var(--accent-green);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .win-score {
            color: var(--accent-yellow);
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1><i class="fas fa-brain"></i> Memory Game</h1>
            <p>Match all pairs to win!</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="moves">0</div>
                <div class="stat-label">Moves</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pairs">0/6</div>
                <div class="stat-label">Pairs</div>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="game-controls">
            <button class="btn btn-secondary" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back to Games
            </button>
            <button class="btn btn-primary" onclick="restartGame()">
                <i class="fas fa-redo"></i> Restart
            </button>
        </div>
    </div>
    
    <div class="win-overlay" id="winOverlay">
        <div class="win-card">
            <h2>🎉 You Won!</h2>
            <div class="win-score" id="finalScore">0</div>
            <button class="btn btn-primary" onclick="restartGame()">
                <i class="fas fa-redo"></i> Play Again
            </button>
        </div>
    </div>

    <script>
        const symbols = ['🚀', '⭐', '🌙', '🔥', '💎', '🎯'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let moves = 0;
        
        function initGame() {
            cards = [...symbols, ...symbols];
            cards.sort(() => Math.random() - 0.5);
            
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            cards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${symbol}</div>
                    </div>
                `;
                card.onclick = () => flipCard(index);
                board.appendChild(card);
            });
            
            flippedCards = [];
            matchedPairs = 0;
            score = 0;
            moves = 0;
            updateStats();
            document.getElementById('winOverlay').classList.remove('show');
        }
        
        function flipCard(index) {
            const cardElements = document.querySelectorAll('.card');
            const card = cardElements[index];
            
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push({ index, symbol: cards[index] });
            
            if (flippedCards.length === 2) {
                moves++;
                checkMatch();
            }
        }
        
        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.symbol === card2.symbol) {
                const cardElements = document.querySelectorAll('.card');
                cardElements[card1.index].classList.add('matched');
                cardElements[card2.index].classList.add('matched');
                
                matchedPairs++;
                score += 10;
                updateStats();
                
                if (matchedPairs === 6) {
                    setTimeout(showWin, 500);
                }
            } else {
                setTimeout(() => {
                    const cardElements = document.querySelectorAll('.card');
                    cardElements[card1.index].classList.remove('flipped');
                    cardElements[card2.index].classList.remove('flipped');
                }, 1000);
            }
            
            flippedCards = [];
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = `${matchedPairs}/6`;
        }
        
        function showWin() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('winOverlay').classList.add('show');
            
            // Save score
            fetch('/save-game-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game: 'memory', score: score })
            });
        }
        
        function restartGame() {
            initGame();
        }
        
        function goBack() {
            window.location.href = '/games';
        }
        
        initGame();
          
        function showWin() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('winOverlay').classList.add('show');
            
            // Save score
            fetch('/save-game-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game: 'memory', score: score })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Score saved:', data);
            })
            .catch(error => {
                console.error('Error saving score:', error);
            });
        }
    
    </script>
</body>
</html>
